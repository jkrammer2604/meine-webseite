<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoucherPay Ultimate | Perfect Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        
        :root {
            --sidebar-width: 280px; --primary: #6366f1; --primary-dark: #4f46e5;
            --bg-body: #f8fafc; --bg-card: #ffffff; --text-main: #0f172a;
            --text-muted: #64748b; --success: #10b981; --danger: #ef4444;
            --warning: #f59e0b; --radius: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-body); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: var(--sidebar-width); background: #fff; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; padding: 32px 20px; flex-shrink: 0; }
        .sidebar-header { font-size: 1.5rem; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 12px; margin-bottom: 40px; justify-content: center; }
        .nav-item { padding: 14px 16px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; color: var(--text-muted); font-weight: 500; transition: 0.2s; }
        .nav-item:hover, .nav-item.active { background: var(--primary); color: white; }
        .sidebar-footer { margin-top: auto; padding-top: 20px; border-top: 1px solid #f1f5f9; }

        /* Layout & Cards */
        .main-content { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .content-container { width: 100%; max-width: 1000px; } 
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; width: 100%; }
        .card { background: #fff; border-radius: var(--radius); padding: 30px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); margin-bottom: 24px; border: 1px solid #f1f5f9; width: 100%; }
        .balance-card { background: linear-gradient(135deg, #6366f1, #a855f7); color: white; border: none; text-align: center; }

        /* Form Elements */
        input, select, textarea { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 14px; background: #f8fafc; font-family: inherit; outline: none; }
        button { cursor: pointer; border: none; font-weight: 600; border-radius: 14px; padding: 12px 24px; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; justify-content: center; height: 50px; }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-success { background: var(--success); color: white; width: 100%; }

        /* FIX: Kleine Admin Buttons */
        .admin-actions { display: flex; gap: 8px; justify-content: flex-end; }
        .btn-admin { width: 38px !important; height: 38px !important; padding: 0 !important; border-radius: 10px !important; flex-shrink: 0; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-success-small { background: var(--success); color: white; }

        /* Tables */
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        td { padding: 18px 15px; background: #fff; border-top: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        td:first-child { border-left: 1px solid #f1f5f9; border-radius: 15px 0 0 15px; }
        td:last-child { border-right: 1px solid #f1f5f9; border-radius: 0 15px 15px 0; }

        /* Status & Badges */
        .status-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .online { background: var(--success); box-shadow: 0 0 10px var(--success); }
        .offline { background: #cbd5e1; }
        .badge { padding: 5px 12px; border-radius: 10px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        .badge-active { background: #dcfce7; color: #166534; }
        .badge-paused { background: #fee2e2; color: #991b1b; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; color: white; }
        .view { display: none; width: 100%; } .view.active { display: block; animation: fadeIn 0.4s; }
        .hidden { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="loading-overlay" class="overlay">
    <i class="fas fa-circle-notch fa-spin fa-3x" style="color: var(--primary)"></i>
    <h2 style="margin-top: 25px;">Daten synchronisieren...</h2>
</div>

<div id="login-overlay" class="overlay" style="display:none;">
    <div style="background: white; padding: 50px; border-radius: 30px; width: 100%; max-width: 400px; text-align: center; color: #0f172a; box-shadow: 0 20px 50px rgba(0,0,0,0.3);">
        <h2 style="margin-bottom: 30px;">VoucherPay Login</h2>
        <input type="text" id="loginUser" placeholder="Benutzername">
        <input type="password" id="loginPass" placeholder="Passwort">
        <button class="btn-primary" onclick="handleLogin()">Anmelden</button>
        <p id="loginError" style="color:red; margin-top:15px; font-size:13px;"></p>
    </div>
</div>

<div class="sidebar">
    <div class="sidebar-header"><i class="fas fa-bolt"></i> VoucherPay</div>
    <div class="nav-item active" onclick="showView('dashboard')" id="nav-dashboard"><i class="fas fa-house"></i> Dashboard</div>
    <div class="nav-item" onclick="showView('transfer')" id="nav-transfer"><i class="fas fa-paper-plane"></i> Senden</div>
    <div class="nav-item" onclick="showView('history')" id="nav-history"><i class="fas fa-history"></i> Verlauf</div>
    <div class="nav-item admin-only" onclick="showView('accounts')" id="nav-accounts"><i class="fas fa-user-shield"></i> Admin Panel</div>
    <div class="nav-item" onclick="showView('settings')" id="nav-settings"><i class="fas fa-cog"></i> Einstellungen</div>
    <div class="sidebar-footer">
        <div class="nav-item" onclick="logout()" style="color: var(--danger)"><i class="fas fa-sign-out-alt"></i> Abmelden</div>
    </div>
</div>

<div class="main-content">
    <div class="content-container">
        <div class="header-bar">
            <h1 id="viewTitle">Dashboard</h1>
            <div id="userBadge" style="text-align: right"></div>
        </div>

        <div id="view-dashboard" class="view active">
            <div class="card balance-card">
                <p style="margin-bottom: 10px; opacity: 0.9;">Kontostand</p>
                <h1 id="myBalanceDisplay" style="font-size: 3.5rem; font-weight: 800;">0.00 §</h1>
            </div>
            <div class="card">
                <h3>Meine Gutscheine</h3>
                <table id="myVouchersTable"><tbody></tbody></table>
            </div>
        </div>

        <div id="view-transfer" class="view">
            <div class="card">
                <h3>Senden</h3>
                <input type="number" id="transferAmount" placeholder="Betrag">
                <select id="moneyReceiverSelect"></select>
                <textarea id="moneyMsg" placeholder="Nachricht..."></textarea>
                <button class="btn-success" onclick="transferMoney()">Geld senden</button>
                <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
                <select id="voucherSelect"></select>
                <select id="voucherReceiverSelect"></select>
                <button class="btn-primary" onclick="transferVoucher()">Gutschein übertragen</button>
            </div>
        </div>

        <div id="view-history" class="view">
            <div class="card">
                <h3>Verlauf</h3>
                <table id="historyTable">
                    <thead><tr><th>Datum</th><th>Partner</th><th>Wert</th><th>Nachricht</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div id="view-accounts" class="view admin-only">
            <div class="card">
                <h3>Nutzerverwaltung</h3>
                <div style="display:flex; gap:12px; margin-bottom: 25px;">
                    <input type="text" id="newAccName" placeholder="Name">
                    <input type="text" id="newAccPass" placeholder="Passwort">
                    <button class="btn-primary" onclick="addAccount()" style="width:auto">Erstellen</button>
                </div>
                <table id="accountTable">
                    <thead><tr><th>Live</th><th>Name</th><th>Status</th><th>Balance</th><th style="text-align:right">Aktion</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
            <div class="card">
                <h3>Gutschein-Druck</h3>
                <div style="display:flex; gap:12px;">
                    <input type="text" id="newVCode" placeholder="Code">
                    <select id="initialOwnerSelect"></select>
                    <button class="btn-primary" onclick="createVoucher()" style="width:auto; background:#334155">Drucken</button>
                </div>
            </div>
        </div>

        <div id="view-settings" class="view">
            <div class="card">
                <h3>Einstellungen</h3>
                <input type="text" id="editUserName" placeholder="Neuer Name">
                <input type="text" id="editUserPass" placeholder="Neues Passwort">
                <button class="btn-primary" onclick="updateUserData()">Speichern</button>
            </div>
            <div class="card admin-only">
                <h3>Backup</h3>
                <button class="btn-primary" onclick="downloadBackup()" style="background:#64748b; width:auto">Backup herunterladen (.json)</button>
            </div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://cilvtkbochcuanmakrgq.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_coOF7Q0OugnqGltdZ5P3Vw_IEa5PRwd';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let accounts = [], vouchers = [], transactions = [], currentUser = null;

    async function sync() {
        const { data: acc } = await db.from('accounts').select('*');
        const { data: vouc } = await db.from('vouchers').select('*');
        const { data: trans } = await db.from('transactions').select('*').order('created_at', { ascending: false });
        if (JSON.stringify(acc) !== JSON.stringify(accounts) || JSON.stringify(vouc) !== JSON.stringify(vouchers) || JSON.stringify(trans) !== JSON.stringify(transactions)) {
            accounts = acc || []; vouchers = vouc || []; transactions = trans || [];
            render();
        }
        document.getElementById('loading-overlay').style.display = 'none';
        if(!currentUser) document.getElementById('login-overlay').style.display = 'flex';
    }

    async function heartbeat() {
        if (currentUser) await db.from('accounts').update({ last_seen: new Date().toISOString() }).eq('id', currentUser.id);
    }

    setInterval(sync, 5000);
    setInterval(heartbeat, 30000);
    window.onload = sync;

    function handleLogin() {
        const name = document.getElementById('loginUser').value.trim();
        const pass = document.getElementById('loginPass').value.trim();
        const found = accounts.find(a => a.name === name && a.pass === pass);
        if(found) {
            if(!found.active) return alert("Account pausiert.");
            currentUser = found;
            document.getElementById('login-overlay').style.display = 'none';
            document.querySelectorAll('.admin-only').forEach(e => currentUser.role === 'admin' ? e.classList.remove('hidden') : e.classList.add('hidden'));
            heartbeat(); render();
        } else { document.getElementById('loginError').innerText = "Anmeldung fehlgeschlagen."; }
    }

    async function transferMoney() {
        const amount = parseFloat(document.getElementById('transferAmount').value);
        const receiverName = document.getElementById('moneyReceiverSelect').value;
        const msg = document.getElementById('moneyMsg').value;
        const receiver = accounts.find(a => a.name === receiverName);
        if(!amount || amount <= 0) return alert("Betrag!");
        if(currentUser.role !== 'admin' && currentUser.balance < amount) return alert("Guthaben!");
        if(currentUser.role !== 'admin') await db.from('accounts').update({ balance: currentUser.balance - amount }).eq('name', currentUser.name);
        await db.from('accounts').update({ balance: receiver.balance + amount }).eq('name', receiverName);
        await db.from('transactions').insert([{ sender: currentUser.name, receiver: receiverName, transaction_type: 'money', amount, message: msg }]);
        sync();
    }

    async function transferVoucher() {
        const code = document.getElementById('voucherSelect').value;
        const receiver = document.getElementById('voucherReceiverSelect').value;
        if(!code) return;
        await db.from('vouchers').update({ owner: receiver }).eq('code', code);
        await db.from('transactions').insert([{ sender: currentUser.name, receiver: receiver, transaction_type: 'voucher', voucher_code: code }]);
        sync();
    }

    async function toggleStatus(name) {
        if(name === currentUser.name) return;
        const acc = accounts.find(a => a.name === name);
        await db.from('accounts').update({ active: !acc.active }).eq('name', name);
        sync();
    }

    async function deleteAcc(name) {
        if(name === currentUser.name) return;
        if(confirm(`${name} löschen?`)) { await db.from('accounts').delete().eq('name', name); sync(); }
    }

    async function addAccount() {
        const name = document.getElementById('newAccName').value.trim();
        const pass = document.getElementById('newAccPass').value.trim();
        if(name && pass) { await db.from('accounts').insert([{ name, pass, role: 'user', active: true, balance: 100 }]); sync(); }
    }

    async function createVoucher() {
        const code = document.getElementById('newVCode').value.trim();
        const owner = document.getElementById('initialOwnerSelect').value;
        if(code) { await db.from('vouchers').insert([{ code, owner }]); sync(); }
    }

    async function updateUserData() {
        const name = document.getElementById('editUserName').value.trim();
        const pass = document.getElementById('editUserPass').value.trim();
        if(name && pass) { await db.from('accounts').update({ name, pass }).eq('id', currentUser.id); location.reload(); }
    }

    function downloadBackup() {
        const data = JSON.stringify({ accounts, vouchers, transactions });
        const blob = new Blob([data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'backup.json'; a.click();
    }

    function render() {
        if(!currentUser) return;
        const user = accounts.find(a => a.id === currentUser.id);
        document.getElementById('myBalanceDisplay').innerText = user.role === 'admin' ? '∞ §' : `${parseFloat(user.balance).toFixed(2)} §`;
        document.getElementById('userBadge').innerHTML = `<strong>${user.name}</strong><br><span class="badge" style="background:#e0e7ff">${user.role.toUpperCase()}</span>`;

        const myV = vouchers.filter(v => v.owner === user.name);
        document.getElementById('myVouchersTable').querySelector('tbody').innerHTML = myV.map(v => `<tr><td><code>${v.code}</code></td><td><span class="badge badge-active">AKTIV</span></td></tr>`).join('');
        
        const others = accounts.filter(a => a.name !== user.name && a.active);
        const opts = others.map(a => `<option value="${a.name}">${a.name}</option>`).join('');
        document.getElementById('moneyReceiverSelect').innerHTML = opts;
        document.getElementById('voucherReceiverSelect').innerHTML = opts;
        document.getElementById('voucherSelect').innerHTML = myV.map(v => `<option value="${v.code}">${v.code}</option>`).join('');
        document.getElementById('initialOwnerSelect').innerHTML = accounts.map(a => `<option value="${a.name}">${a.name}</option>`).join('');

        document.getElementById('historyTable').querySelector('tbody').innerHTML = transactions.filter(t => t.sender === user.name || t.receiver === user.name).map(t => {
            const isS = t.sender === user.name;
            const val = t.transaction_type === 'money' ? `${parseFloat(t.amount).toFixed(2)} §` : `🎟 ${t.voucher_code}`;
            return `<tr><td>${new Date(t.created_at).toLocaleDateString()}</td><td>${isS ? 'An: '+t.receiver : 'Von: '+t.sender}</td><td style="color:${isS?'var(--danger)':'var(--success)'}; font-weight:700">${isS?'-':'+'}${val}</td><td>${t.message||'-'}</td></tr>`;
        }).join('');

        if(user.role === 'admin') {
            const now = new Date();
            document.getElementById('accountTable').querySelector('tbody').innerHTML = accounts.map(a => {
                const online = a.last_seen && (now - new Date(a.last_seen)) < 120000;
                return `<tr>
                    <td><span class="status-dot ${online?'online':'offline'}"></span></td>
                    <td><strong>${a.name}</strong></td>
                    <td><span class="badge ${a.active?'badge-active':'badge-paused'}">${a.active?'AKTIV':'PAUSE'}</span></td>
                    <td>${parseFloat(a.balance).toFixed(2)} §</td>
                    <td style="text-align:right">
                        <div class="admin-actions">
                            <button class="${a.active?'btn-warning':'btn-success-small'} btn-admin" onclick="toggleStatus('${a.name}')"><i class="fas ${a.active?'fa-pause':'fa-play'}"></i></button>
                            <button class="btn-danger btn-admin" onclick="deleteAcc('${a.name}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }
    }

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('view-' + id).classList.add('active');
        document.getElementById('nav-' + id).classList.add('active');
        document.getElementById('viewTitle').innerText = document.getElementById('nav-' + id).innerText;
    }

    function logout() { location.reload(); }
</script>
</body>
</html>
